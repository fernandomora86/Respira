<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080810">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Respiração">
<title>RESPIRAÇÃO</title>
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --border: #1a1a2e;
  --accent: #22d3ee;
  --accent2: #a78bfa;
  --text: #d0f0ff;
  --dim: #3a5060;
  --muted: #0a1520;
  --font: 'Courier New', monospace;
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bottom: env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
body{display:flex;flex-direction:column;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}

header{background:#000;border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.title{font-size:11px;letter-spacing:3px;color:var(--accent);font-weight:bold}

.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.tab{flex:1;padding:10px 2px;font-family:var(--font);font-size:9px;letter-spacing:1px;background:none;border:none;color:var(--dim);cursor:pointer;transition:all .2s;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.page{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page.active{display:flex;flex-direction:column}

/* BREATHE */
.breathe-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:16px}
.profile-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.profile-btn{background:none;border:1px solid var(--border);border-radius:20px;color:var(--dim);cursor:pointer;padding:6px 14px;font-family:var(--font);font-size:10px;letter-spacing:1px;transition:all .2s;white-space:nowrap}
.profile-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(34,211,238,.08)}

.circle-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:210px;height:210px}
.breath-ring{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,rgba(34,211,238,.18) 0%,transparent 70%);border:2px solid rgba(34,211,238,.15)}
.breath-ring.s2{position:absolute;inset:15px;border-radius:50%;background:radial-gradient(circle,rgba(167,139,250,.12) 0%,transparent 70%);border:1px solid rgba(167,139,250,.1)}
.breath-ring.s3{position:absolute;inset:30px;border-radius:50%;background:radial-gradient(circle,rgba(34,211,238,.08) 0%,transparent 70%)}
.circle-center{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:4px}
#phase-label{font-size:12px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;min-height:18px}
#phase-count{font-size:40px;font-weight:bold;color:var(--text);font-variant-numeric:tabular-nums;min-width:60px;text-align:center}
#cycle-info{font-size:11px;color:var(--accent);letter-spacing:1px;font-weight:bold;min-height:16px}

.prog-svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.prog-bg{fill:none;stroke:var(--muted);stroke-width:4}
.prog-fg{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;stroke-dasharray:596.9;stroke-dashoffset:596.9;transition:stroke .4s}

.controls{display:flex;gap:12px}
.btn-ctrl{background:none;border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;padding:12px 24px;font-family:var(--font);font-size:13px;letter-spacing:1px;transition:all .15s}
.btn-ctrl:active{opacity:.7}
.btn-ctrl.primary{background:var(--accent);border-color:var(--accent);color:#000;font-weight:bold}
.btn-ctrl.primary.running{background:var(--surface);border-color:var(--accent);color:var(--accent)}

/* TOAST / PARABÉNS */
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:#000;border:1px solid var(--accent);border-radius:8px;padding:14px 20px;font-size:12px;letter-spacing:1px;color:var(--accent);text-align:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;max-width:280px;line-height:1.6}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast .toast-icon{font-size:22px;display:block;margin-bottom:6px}

/* HISTÓRICO */
.hist-body{padding:16px;display:flex;flex-direction:column;gap:12px}
.hist-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;text-align:center}
.stat-num{font-size:26px;color:var(--accent);font-weight:bold}
.stat-lbl{font-size:9px;letter-spacing:1.5px;color:var(--dim);margin-top:4px}
.stat-sub{font-size:9px;color:var(--dim);margin-top:2px}
.record-card{background:var(--surface);border:1px solid var(--accent);border-radius:6px;padding:14px;display:flex;align-items:center;gap:12px}
.record-icon{font-size:24px}
.record-info{flex:1}
.record-label{font-size:10px;letter-spacing:2px;color:var(--accent)}
.record-val{font-size:20px;font-weight:bold;color:var(--text);margin-top:2px}
.record-sub{font-size:10px;color:var(--dim);margin-top:2px}
.hist-section{font-size:10px;letter-spacing:2px;color:var(--dim)}
.hist-list{display:flex;flex-direction:column;gap:6px}
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;animation:fadeIn .2s ease}
.hist-item.record-item{border-color:var(--accent)}
.hi-left{display:flex;flex-direction:column;gap:3px}
.hi-profile{font-size:12px;color:var(--text)}
.hi-time{font-size:10px;color:var(--dim)}
.hi-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.hi-cycles{font-size:14px;font-weight:bold;color:var(--accent)}
.hi-record{font-size:9px;color:#fbbf24;letter-spacing:1px}
.hist-empty{color:var(--dim);font-size:12px;text-align:center;padding:32px 0}
.btn-clear-hist{background:none;border:1px solid var(--border);border-radius:3px;color:var(--dim);cursor:pointer;padding:8px 16px;font-family:var(--font);font-size:11px;letter-spacing:1px;align-self:center;transition:all .15s}
.btn-clear-hist:active{border-color:#f87171;color:#f87171}

/* PROFILES */
.profiles-body{padding:16px;display:flex;flex-direction:column;gap:14px}
.section-title{font-size:10px;letter-spacing:2px;color:var(--dim);margin-bottom:4px}
.new-form{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;display:flex;flex-direction:column;gap:12px}
.form-row{display:flex;gap:8px;align-items:center}
.form-label{font-size:11px;color:var(--dim);letter-spacing:1px;min-width:28px}
.form-input{flex:1;background:#000;border:1px solid var(--border);border-radius:3px;color:var(--text);padding:9px 12px;font-family:var(--font);font-size:13px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.form-input:focus{border-color:rgba(34,211,238,.5)}
.form-input::placeholder{color:var(--dim)}
.nums-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.num-field{display:flex;flex-direction:column;gap:4px;align-items:center}
.num-label{font-size:9px;color:var(--dim);letter-spacing:1px;text-align:center}
.num-input{width:100%;background:#000;border:1px solid var(--border);border-radius:3px;color:var(--accent);padding:8px 4px;font-family:var(--font);font-size:16px;font-weight:bold;text-align:center;outline:none;-webkit-appearance:none}
.num-input:focus{border-color:rgba(34,211,238,.5)}
.btn-save{background:var(--accent);border:none;border-radius:4px;color:#000;padding:10px;font-family:var(--font);font-size:11px;font-weight:bold;letter-spacing:2px;cursor:pointer;transition:opacity .15s}
.btn-save:active{opacity:.7}
.profile-list{display:flex;flex-direction:column;gap:8px}
.profile-item{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px;display:flex;align-items:center;gap:10px;animation:fadeIn .2s ease}
.profile-item.active-item{border-color:var(--accent)}
.pi-name{flex:1;font-size:13px;color:var(--text)}
.pi-ratio{font-size:11px;color:var(--accent);letter-spacing:1px}
.pi-desc{font-size:10px;color:var(--dim);margin-top:2px}
.btn-use{background:none;border:1px solid var(--border);border-radius:3px;color:var(--dim);cursor:pointer;padding:5px 10px;font-family:var(--font);font-size:10px;letter-spacing:1px;transition:all .15s;white-space:nowrap}
.btn-use:active,.btn-use.used{border-color:var(--accent);color:var(--accent)}
.btn-del{background:none;border:1px solid var(--border);border-radius:3px;color:var(--dim);cursor:pointer;padding:5px 8px;font-family:var(--font);font-size:11px;transition:all .15s}
.btn-del:active{border-color:#f87171;color:#f87171}
.flash{font-size:11px;color:var(--accent);letter-spacing:1px;min-height:16px;transition:opacity .3s}
.flash.hide{opacity:0}
.flash.err{color:#f87171}

@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.page::-webkit-scrollbar{width:3px}
.page::-webkit-scrollbar-thumb{background:var(--border)}
#offline-bar{display:none;background:var(--muted);color:var(--dim);font-size:10px;letter-spacing:2px;text-align:center;padding:4px;flex-shrink:0}
#offline-bar.show{display:block}
</style>
</head>
<body>
<div id="offline-bar">⬡ OFFLINE</div>
<div id="toast"><span class="toast-icon" id="toast-icon">🏆</span><span id="toast-msg"></span></div>

<header>
  <span class="title">*** RESPIRAÇÃO ***</span>
  <span style="font-size:10px;color:var(--dim);letter-spacing:1px" id="hdr-ratio"></span>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="breathe">RESPIRAR</button>
  <button class="tab" data-tab="hist">HISTÓRICO</button>
  <button class="tab" data-tab="profiles">PERFIS</button>
</nav>

<!-- BREATHE -->
<div class="page active" id="tab-breathe">
  <div class="breathe-wrap">
    <div class="profile-bar" id="profileBar"></div>
    <div class="circle-wrap" id="circleWrap">
      <svg class="prog-svg" viewBox="0 0 200 200">
        <circle class="prog-bg" cx="100" cy="100" r="95"/>
        <circle class="prog-fg" id="progFg" cx="100" cy="100" r="95"/>
      </svg>
      <div class="breath-ring" id="ring1"></div>
      <div class="breath-ring s2" id="ring2"></div>
      <div class="breath-ring s3" id="ring3"></div>
      <div class="circle-center">
        <div id="phase-label"></div>
        <div id="phase-count">—</div>
        <div id="cycle-info"></div>
      </div>
    </div>
    <div class="controls">
      <button class="btn-ctrl" id="btnReset">↺</button>
      <button class="btn-ctrl primary" id="btnStart">▶ INICIAR</button>
    </div>
  </div>
</div>

<!-- HISTÓRICO -->
<div class="page" id="tab-hist">
  <div class="hist-body">
    <div class="hist-stats">
      <div class="stat-card">
        <div class="stat-num" id="stat-sessions">0</div>
        <div class="stat-lbl">SESSÕES</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-total-cycles">0</div>
        <div class="stat-lbl">CICLOS TOTAIS</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-today">0</div>
        <div class="stat-lbl">HOJE</div>
        <div class="stat-sub" id="stat-today-cycles"></div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-streak">0</div>
        <div class="stat-lbl">DIAS SEGUIDOS</div>
      </div>
    </div>

    <div class="record-card" id="recordCard" style="display:none">
      <div class="record-icon">🏆</div>
      <div class="record-info">
        <div class="record-label">RECORDE PESSOAL</div>
        <div class="record-val" id="record-val">0 ciclos</div>
        <div class="record-sub" id="record-sub"></div>
      </div>
    </div>

    <div class="hist-section">SESSÕES RECENTES</div>
    <div class="hist-list" id="histList"></div>
    <button class="btn-clear-hist" id="btnClearHist">limpar histórico</button>
  </div>
</div>

<!-- PROFILES -->
<div class="page" id="tab-profiles">
  <div class="profiles-body">
    <div class="section-title">NOVO PERFIL</div>
    <div class="new-form">
      <div class="form-row">
        <div class="form-label">NOME</div>
        <input class="form-input" id="inp-name" placeholder="ex: Ansiedade" maxlength="30" autocomplete="off">
      </div>
      <div class="nums-row">
        <div class="num-field">
          <div class="num-label">INSPIRAR</div>
          <input class="num-input" id="inp-in" type="number" min="1" max="30" value="4">
        </div>
        <div class="num-field">
          <div class="num-label">PAUSA</div>
          <input class="num-input" id="inp-hold1" type="number" min="0" max="30" value="7">
        </div>
        <div class="num-field">
          <div class="num-label">EXPIRAR</div>
          <input class="num-input" id="inp-out" type="number" min="1" max="30" value="4">
        </div>
        <div class="num-field">
          <div class="num-label">PAUSA</div>
          <input class="num-input" id="inp-hold2" type="number" min="0" max="30" value="7">
        </div>
      </div>
      <div id="form-flash" class="flash hide"></div>
      <button class="btn-save" id="btnSave">+ SALVAR PERFIL</button>
    </div>
    <div class="section-title">MEUS PERFIS</div>
    <div class="profile-list" id="profileList"></div>
  </div>
</div>

<script>
const san = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── STORAGE ──
const SK  = 'respiracao_v2';
const SKH = 'respiracao_hist_v1';

function loadProfiles() {
  try {
    const raw = localStorage.getItem(SK);
    if (!raw || raw.length > 100000) return null;
    const d = JSON.parse(raw);
    if (!Array.isArray(d)) return null;
    return d.filter(p =>
      p && typeof p.name==='string' && typeof p.inn==='number' &&
      typeof p.hold1==='number' && typeof p.out==='number' && typeof p.hold2==='number'
    ).slice(0,50);
  } catch { return null; }
}
function saveProfiles() {
  try { localStorage.setItem(SK, JSON.stringify(profiles)); } catch {}
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(SKH);
    if (!raw || raw.length > 500000) return [];
    const d = JSON.parse(raw);
    if (!Array.isArray(d)) return [];
    return d.filter(h =>
      h && typeof h.profileName==='string' && typeof h.cycles==='number' && typeof h.ts==='number'
    ).slice(0,500);
  } catch { return []; }
}
function saveHistory() {
  try { localStorage.setItem(SKH, JSON.stringify(sessHistory)); } catch {}
}

const DEFAULT_PROFILES = [
  { id:'box',     name:'Box Breathing', inn:4, hold1:4, out:4, hold2:4 },
  { id:'478',     name:'4-7-8',         inn:4, hold1:7, out:8, hold2:0 },
  { id:'ansied',  name:'Ansiedade',     inn:4, hold1:7, out:4, hold2:7 },
  { id:'relaxar', name:'Relaxar',       inn:5, hold1:0, out:7, hold2:2 },
  { id:'energia', name:'Energia',       inn:6, hold1:0, out:2, hold2:0 },
];

let profiles    = loadProfiles() || JSON.parse(JSON.stringify(DEFAULT_PROFILES));
let sessHistory = loadHistory();
let activeProfileId = profiles[0]?.id || null;

// ── TOAST ──
let toastTimer;
function showToast(icon, msg, duration=4000) {
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-msg').textContent  = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

// ── HISTORY LOGIC ──
function getBestRecord() {
  if (sessHistory.length === 0) return null;
  return sessHistory.reduce((best, h) => h.cycles > best.cycles ? h : best, sessHistory[0]);
}

function saveSession(cycles) {
  if (cycles < 1) return;
  const p = activeProfile();
  const entry = {
    profileName: p ? p.name : '—',
    profileRatio: p ? `${p.inn}-${p.hold1}-${p.out}-${p.hold2}` : '',
    cycles,
    ts: Date.now()
  };

  // verificar recorde ANTES de inserir
  const prevBest = getBestRecord();
  const isRecord = !prevBest || cycles > prevBest.cycles;

  sessHistory.unshift(entry);
  if (sessHistory.length > 500) sessHistory.pop();
  saveHistory();

  if (isRecord && cycles > 0) {
    setTimeout(() => {
      showToast('🏆', `Novo recorde! ${cycles} ciclo${cycles!==1?'s':''} — parabéns! 🎉`, 5000);
    }, 400);
  }
}

// ── ANIMATION STATE ──
const PHASES    = ['INSPIRAR','PAUSA','EXPIRAR','PAUSA'];
const PHASE_KEYS= ['inn','hold1','out','hold2'];
let running        = false;
let rafId          = null;
let phaseIdx       = 0;
let phaseStartTime = null;
let phaseDuration  = 0;
let cycleCount     = 0;
let sessionStarted = false;

function activeProfile() {
  return profiles.find(p => p.id === activeProfileId) || profiles[0];
}

// ── RING ──
const ring1  = document.getElementById('ring1');
const ring2  = document.getElementById('ring2');
const ring3  = document.getElementById('ring3');
const progFg = document.getElementById('progFg');
const PROG_C = 2 * Math.PI * 95; // 596.9

function setCircle(scale, color) {
  const MIN=0.55, MAX=1.0;
  const s = MIN + (MAX-MIN) * scale;
  ring1.style.transform = `scale(${s})`;
  ring2.style.transform = `scale(${s*0.92})`;
  ring3.style.transform = `scale(${s*0.82})`;
  ring1.style.borderColor   = color ? `${color}44` : 'rgba(34,211,238,.15)';
  ring1.style.background    = `radial-gradient(circle,${color||'#22d3ee'}22 0%,transparent 70%)`;
  progFg.style.stroke       = color || '#22d3ee';
}

function setProgress(pct) {
  progFg.style.strokeDashoffset = PROG_C * (1 - Math.max(0, Math.min(1, pct)));
}

const PHASE_COLORS = ['#22d3ee','#a78bfa','#22d3ee','#a78bfa'];

function updateCycleDisplay() {
  document.getElementById('cycle-info').textContent =
    cycleCount > 0 ? `${cycleCount} ciclo${cycleCount!==1?'s':''}` : '';
}

// ── MAIN LOOP ──
function startPhase(idx) {
  const p = activeProfile();
  phaseIdx = idx % 4;
  const dur = p[PHASE_KEYS[phaseIdx]];
  if (dur === 0) { startPhase(phaseIdx + 1); return; }
  phaseDuration  = dur * 1000;
  phaseStartTime = performance.now();
  document.getElementById('phase-label').textContent = PHASES[phaseIdx];
  runFrame();
}

function runFrame() {
  if (!running) return;
  const elapsed = performance.now() - phaseStartTime;
  const t       = Math.min(elapsed / phaseDuration, 1);
  const color   = PHASE_COLORS[phaseIdx];
  const secLeft = Math.ceil((phaseDuration - elapsed) / 1000);
  document.getElementById('phase-count').textContent = secLeft > 0 ? secLeft : '';

  if      (phaseIdx === 0) { setCircle(t,     color); setProgress(t); }
  else if (phaseIdx === 1) { setCircle(1,     color); setProgress(1); }
  else if (phaseIdx === 2) { setCircle(1-t,   color); setProgress(1-t); }
  else                     { setCircle(0,     color); setProgress(0); }

  if (t < 1) {
    rafId = requestAnimationFrame(runFrame);
  } else {
    // fim de fase — verificar se completou ciclo
    if (phaseIdx === 3 || (phaseIdx === 2 && activeProfile().hold2 === 0)) {
      cycleCount++;
      updateCycleDisplay();
    }
    startPhase(phaseIdx + 1);
  }
}

function startStop() {
  const btn = document.getElementById('btnStart');
  if (running) {
    running = false;
    cancelAnimationFrame(rafId);
    btn.classList.remove('running');
    btn.textContent = '▶ INICIAR';
    // salva sessão ao pausar se já fez ciclos
    if (cycleCount > 0 && sessionStarted) {
      saveSession(cycleCount);
      renderHistory();
      sessionStarted = false;
    }
  } else {
    running        = true;
    sessionStarted = true;
    btn.classList.add('running');
    btn.textContent = '⏸ PAUSAR';
    if (phaseStartTime === null) {
      cycleCount = 0;
      updateCycleDisplay();
      startPhase(0);
    } else {
      phaseStartTime = performance.now();
      startPhase(phaseIdx);
    }
  }
}

function resetBreath() {
  // salva se havia ciclos
  if (cycleCount > 0 && sessionStarted) {
    saveSession(cycleCount);
    renderHistory();
  }
  running        = false;
  sessionStarted = false;
  cancelAnimationFrame(rafId);
  phaseStartTime = null;
  phaseIdx       = 0;
  cycleCount     = 0;
  document.getElementById('btnStart').classList.remove('running');
  document.getElementById('btnStart').textContent = '▶ INICIAR';
  document.getElementById('phase-label').textContent = '';
  document.getElementById('phase-count').textContent = '—';
  document.getElementById('cycle-info').textContent  = '';
  setCircle(0, '#22d3ee');
  setProgress(0);
}

// ── RENDER HISTORY ──
function renderHistory() {
  const today = new Date().toDateString();
  const todaySess   = sessHistory.filter(h => new Date(h.ts).toDateString() === today);
  const totalCycles = sessHistory.reduce((a,h) => a + h.cycles, 0);
  const todayCycles = todaySess.reduce((a,h) => a + h.cycles, 0);

  // streak
  let streak = 0;
  const days = new Set(sessHistory.map(h => new Date(h.ts).toDateString()));
  let dd = new Date();
  while (days.has(dd.toDateString())) { streak++; dd.setDate(dd.getDate()-1); }

  document.getElementById('stat-sessions').textContent     = sessHistory.length;
  document.getElementById('stat-total-cycles').textContent = totalCycles;
  document.getElementById('stat-today').textContent        = todaySess.length;
  document.getElementById('stat-streak').textContent       = streak;
  document.getElementById('stat-today-cycles').textContent = todayCycles > 0 ? `${todayCycles} ciclos` : '';

  // recorde
  const best = getBestRecord();
  const recCard = document.getElementById('recordCard');
  if (best) {
    recCard.style.display = 'flex';
    document.getElementById('record-val').textContent = `${best.cycles} ciclo${best.cycles!==1?'s':''}`;
    const d = new Date(best.ts);
    document.getElementById('record-sub').textContent =
      `${best.profileName} · ${d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})}`;
  } else {
    recCard.style.display = 'none';
  }

  // lista
  const list = document.getElementById('histList');
  if (sessHistory.length === 0) {
    list.innerHTML = '<div class="hist-empty">[ nenhuma sessão registrada ]</div>';
    return;
  }
  const bestCycles = best?.cycles || 0;
  list.innerHTML = sessHistory.slice(0,60).map(h => {
    const d = new Date(h.ts);
    const time = d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const date = d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
    const isRec = h.cycles === bestCycles && bestCycles > 0;
    return `<div class="hist-item${isRec?' record-item':''}">
      <div class="hi-left">
        <div class="hi-profile">${san(h.profileName)}<span style="color:var(--dim);margin-left:6px;font-size:10px">${san(h.profileRatio||'')}</span></div>
        <div class="hi-time">${san(date)} às ${san(time)}</div>
      </div>
      <div class="hi-right">
        <div class="hi-cycles">${h.cycles} ciclo${h.cycles!==1?'s':''}</div>
        ${isRec ? '<div class="hi-record">🏆 RECORDE</div>' : ''}
      </div>
    </div>`;
  }).join('');
}

document.getElementById('btnClearHist').addEventListener('click', () => {
  if (!confirm('Apagar todo o histórico?')) return;
  sessHistory = [];
  saveHistory();
  renderHistory();
});

// ── PROFILE BAR ──
function renderProfileBar() {
  const bar = document.getElementById('profileBar');
  bar.innerHTML = profiles.map(p => `
    <button class="profile-btn${p.id===activeProfileId?' active':''}" data-pid="${san(p.id)}">
      ${san(p.name)}<span style="color:var(--dim);margin-left:6px">${p.inn}-${p.hold1}-${p.out}-${p.hold2}</span>
    </button>
  `).join('');
  bar.querySelectorAll('.profile-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (running || cycleCount > 0) resetBreath();
      activeProfileId = btn.dataset.pid;
      renderProfileBar();
      updateHdrRatio();
    });
  });
}

function updateHdrRatio() {
  const p = activeProfile();
  if (!p) return;
  document.getElementById('hdr-ratio').textContent = `${p.inn}-${p.hold1}-${p.out}-${p.hold2}`;
}

// ── PROFILE LIST ──
let flashTimer2;
function flashMsg(msg, ok=true) {
  const el = document.getElementById('form-flash');
  el.textContent = msg;
  el.className = 'flash' + (ok?'':' err');
  clearTimeout(flashTimer2);
  flashTimer2 = setTimeout(() => el.classList.add('hide'), 2000);
}

function renderProfileList() {
  const list = document.getElementById('profileList');
  if (profiles.length === 0) {
    list.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:12px 0;text-align:center">[ nenhum perfil ]</div>';
    return;
  }
  list.innerHTML = profiles.map(p => `
    <div class="profile-item${p.id===activeProfileId?' active-item':''}">
      <div style="flex:1">
        <div class="pi-name">${san(p.name)}</div>
        <div class="pi-ratio">${p.inn}-${p.hold1}-${p.out}-${p.hold2}</div>
        <div class="pi-desc">inspirar · pausa · expirar · pausa</div>
      </div>
      <button class="btn-use${p.id===activeProfileId?' used':''}" data-pid="${san(p.id)}">usar</button>
      <button class="btn-del" data-pid="${san(p.id)}">✕</button>
    </div>
  `).join('');
  list.querySelectorAll('.btn-use').forEach(btn => {
    btn.addEventListener('click', () => {
      if (running || cycleCount > 0) resetBreath();
      activeProfileId = btn.dataset.pid;
      renderProfileBar(); renderProfileList(); updateHdrRatio();
    });
  });
  list.querySelectorAll('.btn-del').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!confirm('Remover este perfil?')) return;
      const pid = btn.dataset.pid;
      profiles = profiles.filter(p => p.id !== pid);
      if (activeProfileId === pid) activeProfileId = profiles[0]?.id || null;
      saveProfiles(); renderProfileBar(); renderProfileList(); updateHdrRatio();
    });
  });
}

document.getElementById('btnSave').addEventListener('click', () => {
  const name  = document.getElementById('inp-name').value.trim();
  const inn   = parseInt(document.getElementById('inp-in').value)    || 0;
  const hold1 = parseInt(document.getElementById('inp-hold1').value) || 0;
  const out   = parseInt(document.getElementById('inp-out').value)   || 0;
  const hold2 = parseInt(document.getElementById('inp-hold2').value) || 0;
  if (!name)  { flashMsg('Digite um nome.', false); return; }
  if (inn<1)  { flashMsg('Inspirar mínimo 1s.', false); return; }
  if (out<1)  { flashMsg('Expirar mínimo 1s.', false); return; }
  if ([inn,hold1,out,hold2].some(v=>v>30)) { flashMsg('Máximo 30s.', false); return; }
  if (profiles.length>=50) { flashMsg('Limite de 50 perfis.', false); return; }
  profiles.push({ id:'p_'+Date.now(), name, inn, hold1, out, hold2 });
  saveProfiles();
  flashMsg(`"${name}" salvo!`);
  document.getElementById('inp-name').value = '';
  renderProfileBar(); renderProfileList();
});

// ── TABS ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
    if (tab.dataset.tab==='profiles') renderProfileList();
    if (tab.dataset.tab==='hist') renderHistory();
  });
});

document.getElementById('btnStart').addEventListener('click', startStop);
document.getElementById('btnReset').addEventListener('click', resetBreath);

// ── OFFLINE ──
window.addEventListener('online',  ()=>document.getElementById('offline-bar').classList.remove('show'));
window.addEventListener('offline', ()=>document.getElementById('offline-bar').classList.add('show'));
if (!navigator.onLine) document.getElementById('offline-bar').classList.add('show');

// ── SERVICE WORKER ──
const SW=`const C='respiracao-v2';self.addEventListener('install',e=>{self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>new Response('Offline',{status:503}))));});`;
if('serviceWorker'in navigator){const b=new Blob([SW],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(b),{scope:'./'}).catch(()=>{});}

// ── INIT ──
renderProfileBar();
renderProfileList();
renderHistory();
updateHdrRatio();
setCircle(0,'#22d3ee');
setProgress(0);
</script>
</body>
</html>
